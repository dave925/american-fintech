<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - American Fintech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/apex-styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">
    <main>
        <a href="index.html" class="auth-back" aria-label="Back to home">
            <i class="fas fa-arrow-left"></i> Home
        </a>

        <section class="auth-page apex-auth">
            <div class="auth-page__bg" aria-hidden="true"></div>
            <div class="auth-page__grid" aria-hidden="true"></div>
            <div class="auth-page__orb auth-page__orb--1" aria-hidden="true"></div>
            <div class="auth-page__orb auth-page__orb--2" aria-hidden="true"></div>

            <div class="auth-card auth-card--login apex-auth-card">
                <header class="auth-header apex-auth-header">
                    <div class="auth-logo apex-auth-logo">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <h1 class="auth-title apex-auth-title">Welcome back</h1>
                    <p class="auth-subtitle apex-auth-subtitle">Sign in to your secure American Fintech account</p>
                </header>

                <form class="auth-form apex-form" id="loginForm" onsubmit="return false;">
                    <div class="auth-row auth-row--1">
                        <div class="auth-field">
                            <div class="apex-form-group">
                                <label class="apex-label" for="loginEmail">Email or phone number</label>
                                <input type="text" class="apex-input" placeholder="Enter your email or phone number" id="loginEmail">
                            </div>
                        </div>
                    </div>

                    <div class="auth-row auth-row--1">
                        <div class="auth-field">
                            <div class="apex-form-group">
                                <label class="apex-label" for="loginPassword">Password</label>
                                <input type="password" class="apex-input" placeholder="Enter your password" id="loginPassword">
                            </div>
                        </div>
                    </div>

                    <div class="auth-row auth-row--1">
                        <div class="auth-remember">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </div>
                    </div>

                    <div class="auth-actions">
                        <button type="button" class="apex-btn apex-btn-primary apex-btn-full" onclick="handleLogin()">
                            <i class="fas fa-sign-in-alt"></i>
                            Sign in
                        </button>

                        <a href="signup.html" class="apex-btn apex-btn-secondary apex-btn-full">
                            <i class="fas fa-user-plus"></i>
                            Don't have an account? Sign up
                        </a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <div id="chimeToast" class="apex-toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Login successful!</span>
    </div>

    <script src="js/chime-app-fixed.js"></script>
    <script src="js/auth-ui.js"></script>
    <script>
        function handleLogin() {
            apexLogin();
        }

        document.addEventListener('DOMContentLoaded', function() {
            const loginEmail = document.getElementById('loginEmail');
            const loginPassword = document.getElementById('loginPassword');

            function handleEnterKey(event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    apexLogin();
                }
            }

            if (loginEmail) loginEmail.addEventListener('keypress', handleEnterKey);
            if (loginPassword) loginPassword.addEventListener('keypress', handleEnterKey);
        });
    </script>
</body>
</html>
